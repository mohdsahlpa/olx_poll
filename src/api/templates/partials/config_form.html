<form hx-get="/filter" hx-target="#product-list" hx-trigger="change, keyup delay:600ms from:input" hx-indicator="#loading-indicator" class="flex flex-col gap-10">
    <div class="flex items-center gap-3 mb-2">
        <div class="w-2 h-2 bg-black rounded-full animate-pulse"></div>
        <h2 class="text-[11px] uppercase tracking-[0.2em] font-extrabold text-black text-left">Control Panel</h2>
    </div>
    
    <div class="space-y-4">
        <label class="block text-[10px] uppercase tracking-widest font-extrabold text-gray-400">Search Query</label>
        <input type="text" name="query" value="{{ params.query or '' }}" placeholder="Enter keyword..." class="w-full text-sm font-bold border-b-2 border-gray-100 py-2.5 focus:border-black transition-colors focus:outline-none bg-transparent placeholder-gray-200">
    </div>
    
    <div class="space-y-4">
        <label class="block text-[10px] uppercase tracking-widest font-extrabold text-gray-400">Price Floor (INR)</label>
        <div class="relative">
            <span class="absolute left-0 top-2.5 text-sm font-bold text-gray-300">₹</span>
            <input type="number" name="price_min" value="{{ params.price_min or '25000' }}" class="w-full text-sm font-bold border-b-2 border-gray-100 py-2.5 pl-5 focus:border-black transition-colors focus:outline-none bg-transparent">
        </div>
    </div>
    
    <div class="space-y-4">
        <label class="block text-[10px] uppercase tracking-widest font-extrabold text-gray-400">Ordering</label>
        <select name="sort" class="w-full text-sm font-bold border-b-2 border-gray-100 py-2.5 focus:border-black transition-colors bg-transparent focus:outline-none cursor-pointer appearance-none">
            <option value="newest" {% if params.sort == 'newest' %}selected{% endif %}>Fresh Arrivals</option>
            <option value="price_low" {% if params.sort == 'price_low' %}selected{% endif %}>Price: Ascending</option>
            <option value="price_high" {% if params.sort == 'price_high' %}selected{% endif %}>Price: Descending</option>
        </select>
    </div>
    
    <input type="hidden" name="category" value="1453">
    <input type="hidden" name="location" value="2001160">
    <input type="hidden" name="make" value="iphone">
    <input type="hidden" name="size" value="40">
    
    <div class="pt-6">
        <button type="button" onclick="location.reload()" class="text-[10px] uppercase tracking-[0.4em] font-extrabold border-2 border-black py-5 w-full hover:bg-black hover:text-white transition-all active:scale-[0.98] rounded-md">
            Reset Engine
        </button>
    </div>
</form>
