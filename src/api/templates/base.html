<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olx Genie / Feed</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-off-white: #fafafa;
            --bg-pure-white: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --border-light: #f0f0f0;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            font-weight: 600; 
            font-size: 16px; 
            color: var(--text-primary);
            background-color: var(--bg-off-white);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #mobile-menu { transform: translateX(100%); transition: transform 0.3s ease-in-out; }
        #mobile-menu.active { transform: translateX(0); }
        #mobile-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #mobile-overlay.active { opacity: 1; pointer-events: auto; }

        input, select, button { color: var(--text-primary) !important; font-weight: 600 !important; }
        h1, h2, h3, .font-black { color: var(--text-primary) !important; }
    </style>
</head>
<body class="antialiased" hx-ext="sse" sse-connect="/stream">
    <!-- Navbar -->
    <nav class="border-b border-gray-100 py-4 px-6 flex justify-between items-center sticky top-0 bg-white/90 backdrop-blur-md z-50 shadow-sm">
        <a href="/" class="text-lg font-extrabold tracking-[0.2em] uppercase italic">Olx Genie</a>
        
        <div class="flex items-center gap-6">
            <div id="loading-indicator" class="htmx-indicator text-[9px] uppercase tracking-widest text-gray-400 font-bold">Searching...</div>
            {% block mobile_toggle %}{% endblock %}
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="flex flex-col lg:flex-row min-h-screen">
        <!-- SSE Signal listener (Hidden) -->
        <div style="display:none;" 
             sse-swap="message" 
             hx-trigger="sse:message" 
             hx-on:htmx:after-settle="window.handleDiscovery(event.detail.data)"></div>

        <!-- Main Content -->
        <main class="flex-1 px-6 py-8">
            {% block content %}{% endblock %}
        </main>

        <!-- Sidebar Config -->
        {% block sidebar %}{% endblock %}
    </div>

    {% block mobile_menu %}{% endblock %}

    <footer class="border-t border-gray-100 py-16 px-8 text-center text-[10px] uppercase tracking-[0.3em] text-gray-400 font-bold">
        &copy; 2026 Olx Genie. Your Intelligence.
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            const overlay = document.getElementById('mobile-overlay');
            if (menu && overlay) {
                menu.classList.toggle('active');
                overlay.classList.toggle('active');
            }
        }
        
        document.body.addEventListener('htmx:afterOnLoad', function() {
            const menu = document.getElementById('mobile-menu');
            const overlay = document.getElementById('mobile-overlay');
            if (menu && overlay) {
                menu.classList.remove('active');
                overlay.classList.remove('active');
            }
        });

        // --- Genie Heartbeat (Synchronized Polling) ---
        (function() {
            let timeLeft = -1; // Start at -1 to prevent immediate firing before sync
            let isSyncing = false;

            // Handle rich discovery payloads from SSE
            window.handleDiscovery = function(data) {
                try {
                    const product = JSON.parse(data);
                    console.log("Genie Discovery:", product.title);
                    
                    const list = document.getElementById('product-list');
                    if (!list) return;

                    // Create new product card HTML (Matching partials/product_list.html)
                    const card = document.createElement('div');
                    card.className = "group animate-in fade-in slide-in-from-top-4 duration-1000";
                    card.innerHTML = `
                        <a href="/product/${product.id}" class="block">
                            <div class="relative aspect-[4/5] overflow-hidden bg-gray-50 rounded-2xl mb-4 border border-gray-100">
                                ${product.image ? `<img src="${product.image}" alt="${product.title}" class="w-full h-full object-cover grayscale-[0.2] group-hover:grayscale-0 group-hover:scale-105 transition-all duration-700">` : ''}
                                <div class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-2 py-1 rounded-lg shadow-sm border border-gray-100">
                                    <span class="text-[10px] font-black tracking-tighter italic">NEW</span>
                                </div>
                            </div>
                            <div class="space-y-1 px-1">
                                <div class="flex justify-between items-start gap-2">
                                    <h3 class="text-[13px] font-extrabold tracking-tight line-clamp-2 leading-[1.2]">${product.title}</h3>
                                </div>
                                <div class="flex items-center justify-between pt-1">
                                    <span class="text-[11px] font-black tracking-tighter">${product.price}</span>
                                    <span class="text-[9px] uppercase tracking-widest text-gray-400 font-bold">${product.time}</span>
                                </div>
                            </div>
                        </a>
                    `;
                    
                    // Prepend to list
                    list.insertBefore(card, list.firstChild);
                    
                    // Sync heartbeat to reflect the discovery happened
                    syncWithServer();
                } catch (e) {
                    console.error("Genie: Discovery payload error", e);
                }
            };

            // Centralized refresh function (Legacy/Manual trigger)
            window.refreshFeed = function() {
                console.log("Genie: Refresh Triggered.");
                const productList = document.getElementById('product-list');
                if (productList && window.htmx) {
                    htmx.trigger(productList, 'refresh-feed');
                }
                syncWithServer();
            };

            let lastSyncTime = 0;
            const MIN_SYNC_INTERVAL = 2000; // 2 seconds minimum between manual/auto syncs

            async function syncWithServer(force = false) {
                const now = Date.now();
                if (!force && (isSyncing || (now - lastSyncTime < MIN_SYNC_INTERVAL))) return;
                
                isSyncing = true;
                lastSyncTime = now;
                try {
                    const response = await fetch('/api/poll-status');
                    const data = await response.json();
                    
                    // If server says 0, it means poller is currently working. 
                    // We set a small internal delay to avoid immediate re-syncing.
                    timeLeft = data.seconds_remaining <= 0 ? 5 : data.seconds_remaining;
                    
                    console.log("Genie: Heartbeat Synced. Next poll in " + timeLeft + "s");
                } catch (e) {
                    console.error("Genie: Heartbeat sync failed", e);
                    timeLeft = 30; // Fallback on error
                } finally {
                    isSyncing = false;
                }
            }

            function updateUI() {
                const displays = document.querySelectorAll('.countdown-display');

                if (timeLeft < 0) return; // Wait for first sync

                if (timeLeft <= 0) {
                    // Prevent multiple fires
                    timeLeft = -1; 
                    window.refreshFeed();
                } else {
                    timeLeft--;
                }

                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                const timeStr = (timeLeft < 0) ? "--:--" : `${mins}:${secs.toString().padStart(2, '0')}`;
                
                displays.forEach(el => {
                    el.textContent = timeStr;
                });
            }

            // Start the heartbeat
            syncWithServer().then(() => {
                setInterval(updateUI, 1000);
                // Heavy sync every 30s to keep in line with server state
                setInterval(syncWithServer, 30000);
            });
        })();
    </script>
</body>
</html>
